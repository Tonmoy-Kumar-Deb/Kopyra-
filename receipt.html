<!DOCTYPE html>

<style>
.actionBtn{

.smallBtn{

.logoImg{

  min-height:45px;
  max-height:45px;

  border-radius:12px;

  display:block;
}

#qrScanner.hidden{
  display:none !important;
}
body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;

}

.back{

}
#reader{

.popupBox{

  padding:16px;

.searchBox {
  display: flex;

/* input keeps full design */

body {

}

input, textarea {

}
*{

/* buttons keep design + don’t break layout */

.optionCard:hover{

}

.infoRow:hover{
  color:#ffffff;
}

.infoIcon{
  width:22px;
  height:22px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;

  font-size:12px;
  color:#fff;
}
.logoRow{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
}

.logo{
  width:50px;
  height:50px;
  border-radius:12px;
  background:linear-gradient(135deg,#38bdf8,#8b5cf6);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;

}
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  align-items:center;
  justify-content:center;

}

.popupBox{
  background:#fff;
  color:#000;
  width:100%;
  max-width:360px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:16px;
  padding:16px;
  display:flex;

}

.popupBox h3{
  margin-bottom:10px;
}

.popupBox p{

}

.popupBox ul{
  padding-left:18px;

}

.popupBox button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:#fff;

}

.hidden{

}
.brand{

}

.tag{
  font-size:12px;

}

.title{

.row{

.line{
  border-bottom:1px dashed #999;
  margin:12px 0;
}

.subject{
  padding:8px 0;
  border-bottom:1px solid #ddd;
}

.paid{
  position:absolute;
  top:140px;
  right:-30px;
  background:#16a34a;
  color:#fff;
  padding:10px 40px;
  transform:rotate(35deg);
  font-weight:800;
  font-size:18px;
  opacity:0.9;
}

.rejectStamp{
  background:#dc2626;
}

.total{
  font-size:20px;

}

.thank{
  text-align:center;

  font-weight:700;
  color:#16a34a;
}

.small{
  font-size:12px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="top">
  <button class="back" onclick="history.back()">← Back</button>
  <div>Receipt</div>
</div>

<div class="searchBox">

  <input id="tokenInput" placeholder="Enter Token Number">

  <button onclick="search()">⌕</button>

  <button onclick="openQRScanner()" title="Scan QR">
    回
  </button>

</div>
<div class="infoRow" onclick="showTokenInfo()">
  <div class="infoIcon">i</div>
  <div class="infoText">What is Token Number?</div>
</div>
<div id="options"></div>

<div id="billArea"></div>
<div id="tokenPopup" class="popup hidden">
  <div class="popupBox">
    <h3>Token Number</h3>

    <p>
      Token Number is a 14 character code linked to your request.
    </p>

    <ul>
      <li>It starts with letter <b>SP</b></li>
      <li>Example: <b>SP000000000000</b></li>
      <li>It is generated after your booking.</li>
    </ul>

    <button onclick="closeTokenInfo()">Close</button>
  </div>
</div>
<div id="qrScanner" class="popup hidden">
  <div class="popupBox">

   <h3>Scan Token QR</h3>

<!-- CAMERA VIEW -->
<div id="reader"></div>

<!-- BUTTONS BELOW CAMERA -->
<div class="scanActions">

  <button onclick="startCamera()" class="actionBtn smallBtn">
    回 Camera
  </button>

  <label class="actionBtn smallBtn">
    ✉️ From File
    <input type="file" id="qrInputFile" accept="image/*"
      style="display:none" onchange="scanFile(this)">
  </label>

</div>

<!-- CLOSE BUTTON -->
<button onclick="closeQRScanner()" style="margin-top:10px;">
  Close
</button>

  </div>
</div>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDuM6XcepcHyOiewj8zdnaB-6D8X2SWMM0",
  authDomain: "kopyra-34598.firebaseapp.com",
  databaseURL: "https://kopyra-34598-default-rtdb.firebaseio.com",
  projectId: "kopyra-34598"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let currentData = null;
let currentToken = "";

function search(){

  const token = document.getElementById("tokenInput").value.trim();

  if(!token) return;

  db.ref("Bookings/" + token).once("value", snap=>{

    const data = snap.val();

    const options = document.getElementById("options");

    const billArea = document.getElementById("billArea");

    billArea.innerHTML = "";

    if(!data){
      options.innerHTML = `
        <div class="optionCard red">
          Token not found
        </div>
      `;
      return;
    }

    currentData = data;

let advanceVisible = false;
let finalVisible = false;

let status = data.status || "New";

// ADVANCE RECEIPT
if(
  status === "Pending" ||
  status === "Completed" ||
  status === "Delivered"
){
  advanceVisible = true;
}

// FINAL RECEIPT
if(status === "Delivered"){
  finalVisible = true;
}

// MESSAGE
let statusMessage = "";

if(status === "New" || status === "Accepted"){
  statusMessage = "📄 Bill not available right now";
}

if(status === "Rejected"){
  statusMessage = "❌ Work rejected by owner";
}
    currentToken = token;

    

    let html = "";

if(statusMessage){

  html += `
    <div class="optionCard red">
      ${statusMessage}
    </div>
  `;
}

    if(status === "Rejected"){

      html += `
        <div class="optionCard red">
          ❌ Advance Payment Bill Rejected
        </div>

        <div class="optionCard red">
          ❌ Final Payment Bill Rejected
        </div>
      `;
    }

    else{

      if(
        status === "Pending" ||
        status === "Completed" ||
        status === "Delivered"
      ){

       html += `
  <div class="optionCard"
  onclick="downloadPDF('advance')">

    <h3>Advance Payment Bill</h3>

    <div class="small">
      Click to download receipt
    </div>

    <button class="actionBtn"
      onclick="event.stopPropagation();downloadPDF('advance')">
      Download Adv. Payment PDF
    </button>

  </div>
`;
      }

      if(status === "Delivered"){

        if(status === "Delivered"){

  html += `
    <div class="optionCard"
    onclick="downloadPDF('final')">

      <h3>Final Payment Bill</h3>

      <div class="small">
        Click to download receipt
      </div>

      <button class="actionBtn"
        onclick="event.stopPropagation();downloadPDF('final')">
        Download Final Payment PDF
      </button>

    </div>
  `;
}
      }

    }

    options.innerHTML = html;

  });

}

function buildReceiptHTML(type){

  const data = currentData;
  const token = currentToken;

  const subjects = data.subjects || [];
  const extra = Number(data.extraCharges || 0);
  const total = Number(data.totalAmount || 0);
  const advance = Number(data.advanceAmount || 0);
  const final = Number(data.finalAmount || 0);
  const upi = data.upiId || "Not Set";

  const paidAmount = type === "advance" ? advance : final;

  let subjectHTML = "";

  subjects.forEach((s, index) => {

  subjectHTML += `
    <div class="subject">

      <div class="row">
        <b>${s.name}</b>
        <b>₹${s.price || 0}</b>
      </div>

      <div class="small">
        Type: ${s.type} <br>
        Binding: ${s.binding} <br>
        Page No: ${s.pageNumber} <br>
        Border: ${s.border || "-"}<br>
        Work: ${s.workType} <br>
        Urgent: ${s.urgent}
      </div>

    </div>
  `;
});

  return `
    <div class="bill" id="receiptBill">

      <div class="paid">PAID</div>

      
<div class="logoRow" style="justify-content:space-between;">

  <!-- LEFT: Logo + name -->
  <div style="display:flex;align-items:center;gap:12px;">

    <img id="logoImg" src="logo.jpg" class="logoImg">

    <div>
      <div class="brand">Kopyra</div>
      <div class="tag">Assignments made easy</div>
    </div>

  </div>

  <!-- RIGHT: QR CODE -->
  <div id="qrCode"></div>

</div>
      <div class="title">
        ${type === "advance" ? "Advance Payment Receipt" : "Final Payment Receipt"}
      </div>

      <div class="line"></div>

      <div class="row"><span>Name</span><span>${data.customerName}</span></div>
      <div class="row"><span>WhatsApp</span><span>${data.whatsapp}</span></div>
      <div class="row"><span>Department</span><span>${data.department}</span></div><div class="row"><span>Section</span><span>${data.section || "-"}</span></div>
<div class="row"><span>Roll Number</span><span>${data.rollNumber || "-"}</span></div>
<div class="row"><span>Institute</span><span>${data.instituteName || "-"}</span></div>
<div class="row"><span>Address</span><span>${data.instituteAddress || "-"}</span></div>
      <div class="row"><span>Semester</span><span>${data.semester || "-"}</span></div>
      <div class="row"><span>Token</span><span>${token}</span></div>

      <div class="line"></div>

      <h3>Work Details</h3>
      ${subjectHTML}

      <div class="line"></div>

      <div class="row"><span>Total</span><span>₹${total}</span></div>
      <div class="row"><span>Advance</span><span>₹${advance}</span></div>
${type === "advance" ? `
  <div class="row">
    <span>Advance Date & Time</span>
    <span>${formatDateTime(data.advanceTime)}</span>
  </div>
` : ""}
      ${type === "final" ? `
  <div class="row">
    <span>Extra</span>
    <span>₹${extra}</span>
  </div>

  <div class="row">
    <span>Final</span>
    <span>₹${final}</span>
  </div>

  
  <div class="row">
    <span>Final Date & Time</span>
    <span>${formatDateTime(data.finalTime)}</span>
  </div>
` : ""}
      <div class="total">Paid: ₹${paidAmount}</div>

      <div class="line"></div>

      <div class="row"><span>UPI</span><span>${upi}</span></div>

      <div class="thank">Thank You ❤️</div>

    </div>
  `;
}
async function downloadPDF(type){

  const { jsPDF } = window.jspdf;

  const tempDiv = document.createElement("div");
  tempDiv.style.position = "absolute";
  tempDiv.style.left = "-99999px";

  document.body.appendChild(tempDiv);

  tempDiv.innerHTML = buildReceiptHTML(type);

  const qrContainer = tempDiv.querySelector("#qrCode");

  new QRCode(qrContainer, {
    text: currentToken,
    width: 80,
    height: 80,
    colorDark: "#000",
    colorLight: "#ffffff"
  });

  const element = tempDiv.querySelector("#receiptBill");

  const img = tempDiv.querySelector("#logoImg");

  if (img) {
    await new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve;
    });
  }

  const canvas = await html2canvas(element, {
    scale: 2,
    useCORS: true,
    backgroundColor: "#ffffff"
  });

  const imgData = canvas.toDataURL("image/png");

  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  // FULL WIDTH FIT (NO LEFT/RIGHT SPACE)
  const imgWidth = pageWidth;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  let finalHeight = imgHeight;

  if (finalHeight > pageHeight) {
    finalHeight = pageHeight; // prevents overflow
  }

  pdf.addImage(imgData, "PNG", 0, 0, imgWidth, finalHeight);

  pdf.save(`kopyra-receipt-${currentToken}.pdf`);

  document.body.removeChild(tempDiv);
}

function showTokenInfo(){
  document.getElementById("tokenPopup").classList.remove("hidden");
}

function closeTokenInfo(){
  document.getElementById("tokenPopup").classList.add("hidden");
}
let html5QrCode;

function openQRScanner(){
  const el = document.getElementById("qrScanner");
  el.classList.remove("hidden");

  setTimeout(() => {
    startCamera();
  }, 300);
}

function startCamera(){

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Camera not supported in this environment. Use desktop Chrome or hosted site.");
    return;
  }

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(err => {
    alert("Camera blocked. Open in HTTPS or Chrome browser.");
  });

}
const scanBeep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
function onScanSuccess(decodedText){

  // 🔊 beep sound
  scanBeep.play().catch(()=>{});

  stopScanner();

  document.getElementById("qrScanner").classList.add("hidden");

  document.getElementById("tokenInput").value = decodedText;

  search();
}

async function stopScanner() {
  try {
    if (html5QrCode) {
      const state = html5QrCode.getState();
      
      if (state === Html5QrcodeScannerState.SCANNING ||
        state === Html5QrcodeScannerState.PAUSED) {
        
        await html5QrCode.stop();
      }
      
      await html5QrCode.clear();
      html5QrCode = null;
    }
  } catch (err) {
    console.log("Stop scanner error:", err);
  }
}

async function closeQRScanner() {
  await stopScanner();
  document.getElementById("qrScanner").classList.add("hidden");
}
function scanFile(input){

  if(!input.files.length) return;

  const file = input.files[0];

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.scanFile(file, true)
    .then(decodedText => {

      document.getElementById("qrScanner").classList.add("hidden");

      document.getElementById("tokenInput").value = decodedText;

      search();

    })
    .catch(err => {
      alert("QR not detected in image");
    });
}
function formatDateTime(ts){
  if(!ts) return "-";

  return new Date(ts).toLocaleString("en-IN", {
    day: "2-digit",
    month: "short",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}
document.addEventListener("contextmenu", function (e) {
  e.preventDefault();
});
document.addEventListener("keydown", function (e) {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && e.key === "I") ||
    (e.ctrlKey && e.shiftKey && e.key === "J") ||
    (e.ctrlKey && e.key === "U")
  ) {
    e.preventDefault();
  }
});
document.getElementById("tokenInput").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    search();
  }
});
</script>

</body>
</html>
