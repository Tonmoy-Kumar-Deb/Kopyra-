<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order - Kopyra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>


/* allow only input + buttons */
input, button, textarea{
  pointer-events: auto;
}

html, body{
  width:100%;
  overflow-x:hidden;
}
.infoRow{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:15px;
  cursor:pointer;
  color:#cbd5e1;
  font-size:13px;
}

.infoIcon{
  width:22px;
  height:22px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:#4ade80;
  padding:12px 18px;
  border:1px solid #22c55e;
  border-radius:12px;
  font-weight:600;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
}
.searchBox{
  display:flex;
  margin-bottom:15px;
  border-radius:12px;
  overflow:hidden;
  background:rgba(255,255,255,0.12);
}

.searchBtn{
  width:50px;
  flex-shrink:0;
  border:none;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

.searchBtn:last-child{
  background:#16a34a;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}
.searchBox input,
.searchBtn{
  pointer-events: auto;
}
body{
  
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  min-height:100vh;
  padding:20px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.back{
  background:rgba(255,255,255,0.1);
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
}

/* SEARCH */

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:16px;
}
#reader {
  width: 100%;
  height: 300px;
  background: #ffffff;
  border-radius: 12px;
  overflow: hidden;
}
.popupBox{
  background:#fff;
  color:#000;
  width:100%;
  max-width:360px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:16px;
  padding:16px;
  display:flex;
  flex-direction:column;
}

.popupBox h3{
  margin-bottom:10px;
}

.popupBox p{
  font-size:13px;
  margin-bottom:10px;
}

.popupBox ul{
  padding-left:18px;
  font-size:13px;
  margin-bottom:15px;
}

.popupBox button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.hidden{
  display:none;
}

.infoRow{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
  cursor:pointer;
  color:#cbd5e1;
  font-size:13px;
}

.infoIcon{
  width:22px;
  height:22px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
input {
  pointer-events: auto;
}
.page-lock {
  user-select: none;
  -webkit-user-select: none;
  pointer-events: none;
}

.page-lock input {
  user-select: text;
  -webkit-user-select: text;
  pointer-events: auto;
}


.searchBox input{
  flex:1;
  min-width:0;
  padding:12px;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
}



/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:16px;
  margin-top:15px;
}

/* STATUS */
.status{
  margin-top:10px;
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-weight:600;
}

.pending{background:#f59e0b33;color:#fbbf24}
.accepted{background:#2563eb33;color:#60a5fa}
.rejected{background:#ef444433;color:#f87171}
.completed{background:#22c55e33;color:#4ade80}
.delivered{background:#10b98133;color:#34d399}

/* REVIEW */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

/* ⭐ STAR RATING */
.stars{
  font-size:28px;
  margin:10px 0;
  cursor:pointer;
  text-align:center;
}

.stars span{
  color:#fbbf24;
  transition:0.2s;
}

.stars span.active{
  color:#facc15;
  transform:scale(1.2);
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

.submit{
  margin-top:10px;
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:10px;
  color:#fff;
}
body{
  -webkit-user-select:none;
  user-select:none;
}

input,
textarea{
  -webkit-user-select:text;
  user-select:text;
}
</style>
</head>

<body>

<div class="top">
  <button class="back" onclick="history.back()">← Back</button>
  <div>Track Order</div>
</div>

<div class="searchBox">
  <input id="tokenInput"
       placeholder="Enter Token Number"
       onkeydown="if(event.key==='Enter') searchOrder()">

  <button class="searchBtn" onclick="searchOrder()">⌕</button>

  <button class="searchBtn"
          onclick="openQRScanner()"
          style="background:#16a34a;">
    回
  </button>
</div>
<div class="infoRow" onclick="showTokenInfo()">
  <div class="infoIcon">i</div>
  <div class="infoText">What is Token Number?</div>
</div>
<div id="result"></div>
<div id="qrScanner" class="popup hidden">
  <div class="popupBox">

    <h3>Scan Token QR</h3>

    <div id="reader"></div>

    <button onclick="startCamera()" style="margin-top:10px;">
      回 Camera
    </button>
<input
  id="filePicker"
  type="file"
  accept="image/*"
  style="display:none"
  onchange="scanFile(this)">

<button
  onclick="document.getElementById('filePicker').click()"
  style="margin-top:10px;">
  ✉️ From File
</button>

    <button onclick="closeQRScanner()" style="margin-top:10px;">
      Close
    </button>

  </div>
</div>
<!-- REVIEW -->
<div class="overlay" id="reviewBox">
  <div class="modal">
    <h3>Give Review</h3>

    <div class="stars" id="stars">
      <span onclick="setRating(1)">☆</span>
      <span onclick="setRating(2)">☆</span>
      <span onclick="setRating(3)">☆</span>
      <span onclick="setRating(4)">☆</span>
      <span onclick="setRating(5)">☆</span>
    </div>

    <textarea id="reviewText" placeholder="Write your review..."></textarea>
    <button class="submit" onclick="sendReview()">Submit</button>
  </div>
</div>
<div id="tokenPopup" class="popup hidden">
  <div class="popupBox">

    <h3>Token Number</h3>

    <p>
      Token Number is a 14 character code linked to your request.
    </p>

    <ul>
      <li>It starts with letter <b>SP</b></li>
      <li>Example: <b>SP000000000000</b></li>
      <li>It is generated after your booking.</li>
    </ul>

    <button onclick="closeTokenInfo()">Close</button>

  </div>
</div>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "kopyra-34598.firebaseapp.com",
  databaseURL: "https://kopyra-34598-default-rtdb.firebaseio.com",
  projectId: "kopyra-34598"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentToken = "";
let currentRef = null;
let selectedRating = 0;

/* ---------------- EMPTY VIEW ON LOAD ---------------- */
window.onload = function(){
  document.getElementById("result").innerHTML = "";
};

/* ---------------- SEARCH ORDER ---------------- */
function searchOrder(){

  const token = document.getElementById("tokenInput").value.trim();
  if(!token) return;

  currentToken = token;

  if(currentRef){
    currentRef.off();
  }

  currentRef = db.ref("Bookings/" + token);

  currentRef.on("value", snap=>{

    const data = snap.val();
    const box = document.getElementById("result");

    if(!data){
      box.innerHTML = "<div class='card'>No Order Found</div>";
      return;
    }

    const rawStatus = data.status;

    let st = "";
    let progress = 0;

    // 🟡 NOT SET
    if(!rawStatus || rawStatus === "Not Seen"){
      st = "Waiting for owner";
      progress = 0;
    }

    // 🟠 PENDING
    else if(rawStatus === "Pending"){
      st = "Pending";
      progress = 50;
    }

    // 🔵 ACCEPTED
    else if(rawStatus === "Accepted"){
      st = "Accepted";
      progress = 25;
    }

    // 🟢 COMPLETED
    else if(rawStatus === "Completed"){
      st = "Completed";
      progress = 75;
    }

    // 🟢 DELIVERED
    else if(rawStatus === "Delivered"){
      st = "Delivered";
      progress = 100;
    }

    // 🔴 REJECTED
    else if(rawStatus === "Rejected"){
      st = "Rejected";
      progress = 100;
    }

    // fallback
    else{
      st = rawStatus;
      progress = 0;
    }

    box.innerHTML = `
      <div class='card' style='display:flex;justify-content:space-between;align-items:center;gap:15px;'>

        <div>
          <h3>${data.customerName || "Customer"}</h3>
          <p>Token: ${token}</p>

          <div class="status ${st.toLowerCase()}">${st}</div>

          ${st === "Waiting for owner"
            ? `<p style="margin-top:10px;opacity:0.7;">Waiting for owner to check your request ⏳</p>`
            : ""
          }
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;">

          <div style="height:120px;width:6px;background:rgba(255,255,255,0.2);border-radius:10px;position:relative;overflow:hidden;">
            <div id="fillBar" style="
              position:absolute;
              bottom:0;
              width:100%;
              height:0%;
              background:linear-gradient(180deg,#22c55e,#2563eb);
              border-radius:10px;
              transition:height 0.8s ease;
            "></div>
          </div>

          <div style="margin-top:8px;font-size:13px;font-weight:600;">
            ${progress}%
          </div>

        </div>

      </div>
    `;

    setTimeout(() => {
      const fill = document.getElementById("fillBar");
      if(fill){
        fill.style.height = "0%";
        setTimeout(()=>{
          fill.style.height = progress + "%";
        },100);
      }
    }, 50);

  });
}

/* ---------------- STAR RATING ---------------- */
function setRating(n){
  selectedRating = n;

  const stars = document.querySelectorAll("#stars span");

  stars.forEach((s,i)=>{
    if(i < n){
      s.classList.add("active");
      s.innerHTML = "★";
    } else {
      s.classList.remove("active");
      s.innerHTML = "☆";
    }
  });

  console.log("Rating selected:", selectedRating);
}

/* ---------------- REVIEW ---------------- */
function sendReview(){
  const text = document.getElementById("reviewText").value.trim();

  if(selectedRating === 0){
    alert("Please select rating");
    return;
  }

  if(!text){
    alert("Please write review");
    return;
  }

  db.ref("Bookings/" + currentToken + "/review").set({
    text,
    rating:selectedRating,
    time:Date.now()
  });

  document.getElementById("reviewBox").style.display="none";
  showToast("Review submitted successfully ✔");
}

/* ---------------- STATUS ---------------- */
function getPercent(status){

  switch(status){
    case "Accepted": return 25;
    case "Pending": return 50;
    case "Completed": return 75;
    case "Delivered": return 100;
    case "Rejected": return 0;
    default: return 0;
  }
}
function showToast(msg){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  }, 2000);
}
function showTokenInfo(){
  document.getElementById("tokenPopup")
    .classList.remove("hidden");
}

function closeTokenInfo(){
  document.getElementById("tokenPopup")
    .classList.add("hidden");
}

let html5QrCode;

function openQRScanner(){
  document.getElementById("qrScanner")
    .classList.remove("hidden");

  startCamera();
}

function startCamera(){

  Html5Qrcode.getCameras()
    .then(devices => {

      if(devices && devices.length){

        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
          devices[0].id,
          {
            fps:10,
            qrbox:200
          },
          onScanSuccess
        );
      }else{
        alert("No camera found");
      }

    })
    .catch(err=>{
      alert("Camera permission denied");
      console.log(err);
    });
}

function onScanSuccess(decodedText){

  stopScanner();

  document.getElementById("qrScanner").classList.add("hidden");

  document.getElementById("tokenInput").value = decodedText;

  searchOrder();   // IMPORTANT
}

async function stopScanner() {
  try {
    if (html5QrCode) {
      await html5QrCode.stop();
      await html5QrCode.clear();
      html5QrCode = null;
    }
  } catch (err) {}
}

async function closeQRScanner() {
  await stopScanner();
  document.getElementById("qrScanner").classList.add("hidden");
}

function scanFile(input){

  if(!input.files.length) return;

  const file = input.files[0];

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.scanFile(file, true)
    .then(decodedText => {

      document.getElementById("qrScanner").classList.add("hidden");

      document.getElementById("tokenInput").value = decodedText;

      searchOrder();   // IMPORTANT

    })
    .catch(err => {
      alert("QR not detected in image");
    });
}








</script>
<div id="toast" class="toast"></div>
</body>
</html>
